<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal EMEF Antônio Barroso Braga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0c1f5e; --navy-dark: #08163f; --navy-mid: #12296e;
      --gold: #f5c018; --teal-1: #00b5c8; --teal-2: #00d4b0; --teal-3: #00e5c4;
      --bg: #eef1f8; --sidebar-w: 210px; --header-h: 88px;
      --radius: 14px; --shadow: 0 4px 24px rgba(12,31,94,.10);
      --shadow-hover: 0 8px 36px rgba(12,31,94,.18);
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: #1a1a2e; }
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--header-h);
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 55%, #183086 100%);
      display: flex; align-items: center; padding: 0 1.5rem;
      border-bottom: 3px solid var(--gold); box-shadow: 0 4px 32px rgba(8,22,63,.45);
    }
    .logo-wrap {
      width: 62px; height: 62px; flex-shrink: 0; background: white; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--gold); box-shadow: 0 2px 12px rgba(0,0,0,.3); overflow: hidden;
    }
    .logo-svg { width: 54px; height: 54px; }
    .header-title { margin-left: 1rem; flex: 1; }
    .header-title h1 {
      font-size: clamp(1.1rem, 2vw, 1.55rem); font-weight: 900; color: var(--gold);
      letter-spacing: .04em; text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,.35); line-height: 1.15;
    }
    .header-title p { font-size: .72rem; font-weight: 500; color: rgba(255,255,255,.65); letter-spacing: .12em; text-transform: uppercase; margin-top: 2px; }
    .header-actions { display: flex; gap: .75rem; align-items: center; }
    .icon-btn {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
      border-radius: 50%; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; transition: var(--transition);
    }
    .icon-btn:hover { background: rgba(255,255,255,.2); transform: scale(1.08); }
    .icon-btn.admin-active { background: var(--gold); color: var(--navy); border-color: var(--gold); }
    .app-wrap { display: flex; padding-top: var(--header-h); min-height: 100vh; }
    aside {
      width: var(--sidebar-w); flex-shrink: 0; position: fixed; top: var(--header-h); bottom: 0; left: 0;
      background: white; border-right: 1px solid #dde3f0; padding: 1.4rem 0 1rem;
      overflow-y: auto; box-shadow: 2px 0 16px rgba(12,31,94,.07); z-index: 90;
    }
    .sidebar-label { font-size: .68rem; font-weight: 700; color: #8a9bbf; letter-spacing: .14em; text-transform: uppercase; padding: 0 1.1rem .6rem; }
    .nav-item {
      display: flex; align-items: center; gap: .7rem; padding: .72rem 1.1rem; margin: 2px .5rem;
      border-radius: 10px; cursor: pointer; font-size: .875rem; font-weight: 500; color: #445;
      transition: var(--transition); position: relative;
    }
    .nav-item:hover { background: #f0f4ff; color: var(--navy); }
    .nav-item.active { background: linear-gradient(90deg, var(--navy) 0%, var(--navy-mid) 100%); color: white; font-weight: 600; box-shadow: 0 4px 16px rgba(12,31,94,.25); }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 25%; bottom: 25%; width: 3px; background: var(--gold); border-radius: 0 4px 4px 0; margin-left: -.5rem; }
    .nav-icon { width: 20px; height: 20px; flex-shrink: 0; opacity: .75; }
    .nav-item.active .nav-icon { opacity: 1; }
    main { margin-left: var(--sidebar-w); flex: 1; padding: 2rem 2.5rem 4rem; min-height: calc(100vh - var(--header-h)); }
    .section-header { margin-bottom: 2rem; }
    .section-header h2 {
      font-size: 1.9rem; font-weight: 800;
      background: linear-gradient(135deg, var(--navy) 0%, #2855c8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .section-header p { color: #6b7ba4; font-size: .9rem; margin-top: .3rem; }
    .section-divider { width: 52px; height: 3px; margin-top: .75rem; background: linear-gradient(90deg, var(--gold), transparent); border-radius: 2px; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }
    .card {
      background: white; border-radius: var(--radius); padding: 1.6rem 1.4rem 1.4rem;
      box-shadow: var(--shadow); border: 1px solid #e8edf8; transition: var(--transition);
      display: flex; flex-direction: column; align-items: center; gap: 1rem; position: relative; overflow: hidden;
    }
    .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,181,200,.04) 0%, rgba(0,212,176,.04) 100%); opacity: 0; transition: var(--transition); }
    .card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(8,22,63,.35), 0 0 0 2px rgba(8,22,63,.15); border-color: #a0b0e0; }
    .card:hover::before { opacity: 1; }
    .card-icon { width: 52px; height: 52px; background: linear-gradient(135deg, #e8f0ff 0%, #ddf3fc 100%); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--navy); transition: var(--transition); }
    .card:hover .card-icon { transform: scale(1.08); }
    .card-title { font-size: .78rem; font-weight: 700; color: #334; text-transform: uppercase; letter-spacing: .07em; text-align: center; line-height: 1.4; }
    .btn-access {
      display: flex; align-items: center; justify-content: center; width: 100%; padding: .62rem 1rem;
      background: linear-gradient(90deg, var(--teal-1) 0%, var(--teal-2) 100%);
      color: white; font-size: .78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      border: none; border-radius: 8px; cursor: pointer; transition: var(--transition); text-decoration: none;
      box-shadow: 0 4px 14px rgba(0,181,200,.3);
    }
    .btn-access:hover {
      background: var(--navy-dark) !important;
      color: var(--gold) !important;
      box-shadow: 0 6px 20px rgba(8,22,63,.40) !important;
      transform: translateY(-1px);
    }
    .btn-sub:hover { background: var(--navy-dark) !important; color: var(--gold) !important; transform: translateY(-1px); }
    .card-icon-link { display: contents; text-decoration: none; }
    .card-icon-link .card-icon { cursor: pointer; }
    .card-icon-link:hover .card-icon { transform: scale(1.12); }
    .sub-btns { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; width: 100%; }
    .btn-sub {
      flex: 1; min-width: 80px; padding: .55rem .6rem;
      background: linear-gradient(90deg, var(--teal-1), var(--teal-2));
      color: white; font-size: .7rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      border: none; border-radius: 8px; cursor: pointer; transition: var(--transition); text-decoration: none; text-align: center;
      box-shadow: 0 3px 10px rgba(0,181,200,.25);
    }
    .btn-sub-default:hover { background: linear-gradient(90deg, var(--teal-2), var(--teal-3)); transform: translateY(-1px); }
    .admin-overlay { position: absolute; top: .6rem; right: .6rem; display: flex; gap: .3rem; z-index: 5; }
    .admin-mini-btn { width: 26px; height: 26px; border-radius: 7px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .8rem; transition: var(--transition); }
    .btn-edit-card { background: #e8f0ff; color: var(--navy); }
    .btn-del-card  { background: #ffe8e8; color: #c0392b; }
    .btn-edit-card:hover { background: var(--navy); color: white; }
    .btn-del-card:hover  { background: #c0392b; color: white; }
    .fab {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 200; width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold) 0%, #e8a800 100%); color: var(--navy); border: none; font-size: 1.5rem;
      box-shadow: 0 6px 24px rgba(200,150,0,.4); cursor: pointer; transition: var(--transition);
      display: none; align-items: center; justify-content: center;
    }
    .fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 10px 32px rgba(200,150,0,.55); }
    .fab.visible { display: flex; }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500; background: rgba(8,22,63,.6); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
      opacity: 0; pointer-events: none; transition: var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white; border-radius: 18px; padding: 2rem; width: 100%; max-width: 440px;
      box-shadow: 0 24px 80px rgba(8,22,63,.4); transform: scale(.94) translateY(16px); transition: var(--transition);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal h3 { font-size: 1.25rem; font-weight: 800; color: var(--navy); margin-bottom: 1.25rem; text-align: center; }
    .modal-input {
      width: 100%; background: #f4f6fb; border: 1.5px solid #dde3f0; border-radius: 10px; padding: .75rem 1rem;
      font-family: 'Inter', sans-serif; font-size: .9rem; color: #1a1a2e; outline: none; transition: var(--transition); margin-bottom: .75rem;
    }
    .modal-input:focus { border-color: var(--teal-1); background: white; }
    .modal-select {
      width: 100%; background: #f4f6fb; border: 1.5px solid #dde3f0; border-radius: 10px; padding: .75rem 1rem;
      font-family: 'Inter', sans-serif; font-size: .9rem; color: #1a1a2e; outline: none; transition: var(--transition); margin-bottom: .75rem; appearance: none; cursor: pointer;
    }
    .modal-actions { display: flex; gap: .75rem; margin-top: .5rem; }
    .btn-modal-confirm {
      flex: 1; padding: .8rem; border: none; border-radius: 10px;
      background: linear-gradient(90deg, var(--teal-1), var(--teal-2));
      color: white; font-weight: 700; font-size: .9rem; cursor: pointer; transition: var(--transition);
    }
    .btn-modal-confirm:hover { background: linear-gradient(90deg, var(--teal-2), var(--teal-3)); }
    .btn-modal-cancel {
      padding: .8rem 1.4rem; border: 1.5px solid #dde3f0; border-radius: 10px;
      background: white; color: #6b7ba4; font-weight: 600; font-size: .9rem; cursor: pointer; transition: var(--transition);
    }
    .btn-modal-cancel:hover { background: #f4f6fb; }
    .sub-btn-list { margin-bottom: .75rem; }
    .sub-btn-row { display: flex; gap: .5rem; margin-bottom: .4rem; }
    .sub-btn-row input { flex: 1; }
    .btn-remove-sub { width: 36px; height: 36px; border: none; border-radius: 8px; background: #ffe8e8; color: #c0392b; cursor: pointer; font-size: 1rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .btn-add-sub {
      background: none; border: 1.5px dashed #dde3f0; border-radius: 8px; color: #8a9bbf;
      font-size: .8rem; font-weight: 600; padding: .5rem; width: 100%; cursor: pointer; transition: var(--transition);
    }
    .btn-add-sub:hover { border-color: var(--teal-1); color: var(--teal-1); }
    .login-error { font-size: .82rem; color: #c0392b; text-align: center; margin-top: .5rem; display: none; }
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(120%);
      z-index: 999; background: #1a1a2e; color: white; padding: .75rem 1.5rem; border-radius: 99px;
      font-size: .85rem; font-weight: 600; box-shadow: 0 8px 28px rgba(0,0,0,.25);
      transition: transform .3s cubic-bezier(.4,0,.2,1); white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.green { background: linear-gradient(90deg, #00b5a0, #00c67c); }
    .toast.red   { background: linear-gradient(90deg, #c0392b, #e74c3c); }
    footer {
      margin-left: var(--sidebar-w); background: white; border-top: 1px solid #e0e6f0;
      padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
      font-size: .78rem; color: #8a9bbf; flex-wrap: wrap; gap: .5rem;
    }
    footer a { color: #6b7ba4; text-decoration: none; margin-left: 1.2rem; }
    footer a:hover { color: var(--navy); }
    .spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #e0e6f0; border-top-color: var(--teal-1); animation: spin .7s linear infinite; margin: 4rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 700px) {
      :root { --sidebar-w: 0px; }
      aside { transform: translateX(-100%); }
      aside.mobile-open { transform: translateX(0); width: 220px; }
      main { padding: 1.25rem 1rem 4rem; }
      footer { margin-left: 0; }
      .header-title h1 { font-size: 1rem; }
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card { animation: fadeUp .4s ease both; }
    .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.10s} .card:nth-child(3){animation-delay:.15s}
    .card:nth-child(4){animation-delay:.20s} .card:nth-child(5){animation-delay:.25s} .card:nth-child(6){animation-delay:.30s}
    .card:nth-child(7){animation-delay:.35s} .card:nth-child(8){animation-delay:.40s} .card:nth-child(9){animation-delay:.45s}
  </style>
</head>

  link:      `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  dashboard: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>`,
  users:     `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
};
const ICON_KEYS = Object.keys(ICONS);

const DEFAULT_DATA = {
  sections: {
    painel: {
      order: 0, label: "Painel", navIcon: "dashboard",
      title: "Painel", subtitle: "Acesso rápido às plataformas e recursos da escola",
      cards: {
        c1: { title: "SME System Professores",  icon: "laptop",    url: "https://sme.prefeitura.sp.gov.br", order: 0 },
        c2: { title: "Registros de Ocorrência", icon: "document",  url: "https://sme.prefeitura.sp.gov.br", order: 1 },
        c3: { title: "Avaliações 5° Anos", icon: "folder", url: "", order: 2,
              subButtons: [{ label: '5° Ano "A"', url: "https://sme.prefeitura.sp.gov.br" }, { label: '5° Ano "B"', url: "https://sme.prefeitura.sp.gov.br" }] },
        c4: { title: "SME System Avaliação",    icon: "checklist", url: "https://sme.prefeitura.sp.gov.br", order: 3 },
        c5: { title: "SME System Escola",       icon: "grid",      url: "https://sme.prefeitura.sp.gov.br", order: 4 },
        c6: { title: "Instagram ABB",           icon: "camera",    url: "https://instagram.com",            order: 5 },
        c7: { title: "Leitura",                 icon: "book",      url: "https://sme.prefeitura.sp.gov.br", order: 6 },
        c8: { title: "PEI's",                   icon: "person",    url: "https://sme.prefeitura.sp.gov.br", order: 7 },
        c9: { title: "Diversos",                icon: "shapes",    url: "https://sme.prefeitura.sp.gov.br", order: 8 },
      }
    },
    recursos: {
      order: 1, label: "Recursos", navIcon: "star",
      title: "Central de Recursos", subtitle: "Ferramentas digitais e materiais de apoio",
      cards: {
        r1: { title: "Wordwall",             icon: "grid",     url: "https://wordwall.net",       order: 0 },
        r2: { title: "ChatGPT",              icon: "robot",    url: "https://chat.openai.com",    order: 1 },
        r3: { title: "Caça-Palavras",        icon: "search",   url: "#",                          order: 2 },
        r4: { title: "Desenhos",             icon: "edit",     url: "https://autodraw.com",       order: 3 },
        r5: { title: "Tudo Sala de Aula",    icon: "book",     url: "#",                          order: 4 },
        r6: { title: "Apostilas de Apoio",   icon: "document", url: "https://drive.google.com",   order: 5 },
        r7: { title: "Horário e Calendário", icon: "calendar", url: "https://drive.google.com",   order: 6 },
        r8: { title: "Drive Anos Iniciais",  icon: "cloud",    url: "https://drive.google.com",   order: 7 },
      }
    },
  }
};

let dbData = null, currentSection = null, isAdmin = false;

const mainArea     = document.getElementById('main-area');
const navMenu      = document.getElementById('nav-menu');
const fabAdd       = document.getElementById('fab-add');
const btnUser      = document.getElementById('btn-user');
const modalOverlay = document.getElementById('modal-overlay');
const modalBox     = document.getElementById('modal-box');
const toastEl      = document.getElementById('toast');

function showToast(msg, type = '') {
  toastEl.textContent = msg; toastEl.className = `toast ${type} show`;
  clearTimeout(toastEl._t); toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2600);
}
function openModal(html, onConfirm) {
  modalBox.innerHTML = html; modalOverlay.classList.add('open');
  modalBox.querySelector('#modal-confirm')?.addEventListener('click', onConfirm);
  modalBox.querySelector('#modal-cancel')?.addEventListener('click', closeModal);
  modalOverlay.onclick = e => { if (e.target === modalOverlay) closeModal(); };
}
function closeModal() { modalOverlay.classList.remove('open'); }

function setAdmin(val) {
  isAdmin = val;
  btnUser.classList.toggle('admin-active', isAdmin);
  btnUser.title = isAdmin ? 'Sair (Admin)' : 'Entrar como Admin';
  fabAdd.classList.toggle('visible', isAdmin);
  renderCurrentSection();
}

btnUser.addEventListener('click', () => {
  if (isAdmin) { setAdmin(false); showToast('Logout realizado.'); }
  else showLoginModal();
});

function showLoginModal() {
  openModal(`
    <h3>🔐 Acesso Administrativo</h3>
    <input class="modal-input" id="login-pass" type="password" placeholder="Senha"/>
    <p class="login-error" id="login-error">Senha incorreta.</p>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="modal-cancel">Cancelar</button>
      <button class="btn-modal-confirm" id="modal-confirm">Entrar</button>
    </div>`, () => {
    const pass = modalBox.querySelector('#login-pass').value;
    if (pass === ADMIN_PASSWORD) { closeModal(); setAdmin(true); showToast('Bem-vindo, Admin! ✓', 'green'); }
    else { modalBox.querySelector('#login-error').style.display = 'block'; }
  });
  setTimeout(() => modalBox.querySelector('#login-pass')?.focus(), 100);
}

const portalRef = ref(db, 'portal');
onValue(portalRef, snap => {
  if (!snap.exists()) {
    set(portalRef, DEFAULT_DATA);
  } else {
    const sections = snap.val()?.sections || {};
    ['avaliacoes','documentos','comunidade'].forEach(key => {
      if (sections[key] !== undefined) remove(ref(db, `portal/sections/${key}`));
    });
  }
}, { onlyOnce: true });

onValue(portalRef, snap => {
  dbData = snap.val() || DEFAULT_DATA;
  if (!currentSection) currentSection = Object.keys(dbData.sections || {})[0];
  renderNav(); renderCurrentSection();
  document.getElementById('loading-spinner')?.remove();
});

function renderNav() {
  if (!dbData) return;
  const secs = Object.entries(dbData.sections || {}).sort((a,b) => (a[1].order||0)-(b[1].order||0));
  navMenu.innerHTML = secs.map(([key, sec]) =>
    `<div class="nav-item ${currentSection===key?'active':''}" data-key="${key}">
      <span class="nav-icon">${ICONS[sec.navIcon]||ICONS.link}</span>${sec.label}
    </div>`).join('');
  navMenu.querySelectorAll('.nav-item').forEach(el =>
    el.addEventListener('click', () => { currentSection = el.dataset.key; renderNav(); renderCurrentSection(); }));
}

function renderCurrentSection() {
  if (!dbData || !currentSection) return;
  const sec = (dbData.sections||{})[currentSection];
  if (!sec) return;
  const cards = Object.entries(sec.cards||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));

  const adminBar = key => isAdmin ? `
    <div class="admin-overlay">
      <button class="admin-mini-btn btn-edit-card" data-key="${key}">✎</button>
      <button class="admin-mini-btn btn-del-card" data-key="${key}">✕</button>
    </div>` : '';

  const renderCard = ([key, card]) => {
    const hasSub = card.subButtons?.length > 0;
    const btns = hasSub
      ? `<div class="sub-btns">${card.subButtons.map(sb=>`<a class="btn-sub" href="${sb.url||'#'}" target="_blank" rel="noopener">${sb.label}</a>`).join('')}</div>`
      : `<a class="btn-access" href="${card.url||'#'}" target="_blank" rel="noopener">Acesso</a>`;
    const iconHtml = `<div class="card-icon">${ICONS[card.icon]||ICONS.link}</div>`;
    const iconWrapped = card.iconUrl
      ? `<a class="card-icon-link" href="${card.iconUrl}" target="_blank" rel="noopener">${iconHtml}</a>`
      : iconHtml;
    return `<div class="card">${adminBar(key)}${iconWrapped}<div class="card-title">${card.title}</div>${btns}</div>`;
  };

  mainArea.innerHTML = `
    <div class="section-header">
      <h2>${sec.title}</h2><p>${sec.subtitle||''}</p>
      <div class="section-divider"></div>
    </div>
    <div class="cards-grid">
      ${cards.length ? cards.map(renderCard).join('') : '<p style="color:#8a9bbf;padding:1rem 0">Nenhum card cadastrado.</p>'}
    </div>`;

  mainArea.querySelectorAll('.btn-access, .btn-sub').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      btn.style.setProperty('background', '#08163f', 'important');
      btn.style.setProperty('color', '#f5c018', 'important');
      btn.style.setProperty('box-shadow', '0 10px 28px rgba(8,22,63,.55)', 'important');
      btn.style.setProperty('transform', 'translateY(-5px) scale(1.04)', 'important');
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.removeProperty('background');
      btn.style.removeProperty('color');
      btn.style.removeProperty('box-shadow');
      btn.style.removeProperty('transform');
    });
  });

  if (isAdmin) {
    mainArea.querySelectorAll('.btn-edit-card').forEach(b => b.addEventListener('click', e => { e.preventDefault(); showCardModal(currentSection, b.dataset.key); }));
    mainArea.querySelectorAll('.btn-del-card').forEach(b  => b.addEventListener('click', e => { e.preventDefault(); confirmDeleteCard(currentSection, b.dataset.key); }));
  }
}

fabAdd.addEventListener('click', () => showCardModal(currentSection, null));

function showCardModal(sectionKey, cardKey) {
  const sec = (dbData?.sections||{})[sectionKey]||{};
  const existing = cardKey ? (sec.cards||{})[cardKey] : null;
  const iconOpts = ICON_KEYS.map(k=>`<option value="${k}" ${existing?.icon===k?'selected':''}>${k}</option>`).join('');
  const subHtml = (existing?.subButtons||[]).map(sb=>`
    <div class="sub-btn-row">
      <input class="modal-input sub-label" style="margin:0" placeholder='Label' value="${sb.label||''}"/>
      <input class="modal-input sub-url" style="margin:0" placeholder="URL" value="${sb.url||''}"/>
      <button class="btn-remove-sub" onclick="this.closest('.sub-btn-row').remove()">✕</button>
    </div>`).join('');

  openModal(`
    <h3>${existing?'✎ Editar Card':'＋ Novo Card'}</h3>
    <input class="modal-input" id="card-title"    placeholder="Título"                  value="${existing?.title||''}"/>
    <input class="modal-input" id="card-url"      placeholder="URL do botão Acesso"     value="${existing?.url||''}"/>
    <input class="modal-input" id="card-icon-url" placeholder="URL da figura (opcional)" value="${existing?.iconUrl||''}"/>
    <select class="modal-select" id="card-icon">${iconOpts}</select>
    <div class="sub-btn-list" id="sub-btn-list">${subHtml}</div>
    <button class="btn-add-sub" id="btn-add-sub-row">＋ Adicionar sub-botão</button>
    <div class="modal-actions" style="margin-top:1rem">
      <button class="btn-modal-cancel" id="modal-cancel">Cancelar</button>
      <button class="btn-modal-confirm" id="modal-confirm">Salvar</button>
    </div>`, async () => {
    const title   = modalBox.querySelector('#card-title').value.trim();
    const url     = modalBox.querySelector('#card-url').value.trim();
    const iconUrl = modalBox.querySelector('#card-icon-url').value.trim();
    const icon    = modalBox.querySelector('#card-icon').value;
    const subBtns = [...modalBox.querySelectorAll('#sub-btn-list .sub-btn-row')]
      .map(r=>({ label: r.querySelector('.sub-label').value.trim(), url: r.querySelector('.sub-url').value.trim() }))
      .filter(s=>s.label);
    if (!title) { showToast('Preencha o título.','red'); return; }
    const cardData = { title, url, iconUrl, icon, order: existing?.order??Date.now(), subButtons: subBtns };
    const path = cardKey
      ? `portal/sections/${sectionKey}/cards/${cardKey}`
      : `portal/sections/${sectionKey}/cards/${push(ref(db)).key}`;
    try { await set(ref(db, path), cardData); showToast(cardKey?'Atualizado! ✓':'Criado! ✓','green'); closeModal(); }
    catch(e) { showToast('Erro: '+e.message,'red'); }
  });
  modalBox.querySelector('#btn-add-sub-row')?.addEventListener('click', () => {
    const row = document.createElement('div');
    row.className = 'sub-btn-row';
    row.innerHTML = `<input class="modal-input sub-label" style="margin:0" placeholder='Label'/><input class="modal-input sub-url" style="margin:0" placeholder="URL"/><button class="btn-remove-sub" onclick="this.closest('.sub-btn-row').remove()">✕</button>`;
    modalBox.querySelector('#sub-btn-list').appendChild(row);
  });
}

function confirmDeleteCard(sectionKey, cardKey) {
  const title = ((dbData?.sections||{})[sectionKey]?.cards||{})[cardKey]?.title||'';
  openModal(`
    <h3>🗑 Excluir Card</h3>
    <p style="text-align:center;color:#6b7ba4;margin-bottom:1.5rem">Excluir <strong>"${title}"</strong>?</p>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="modal-cancel">Cancelar</button>
      <button class="btn-modal-confirm" style="background:linear-gradient(90deg,#c0392b,#e74c3c)" id="modal-confirm">Excluir</button>
    </div>`, async () => {
    try { await remove(ref(db, `portal/sections/${sectionKey}/cards/${cardKey}`)); showToast('Excluído.','green'); closeModal(); }
    catch(e) { showToast('Erro: '+e.message,'red'); }
  });
}
</script>
</body>
</html>
